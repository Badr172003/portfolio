<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="guss.css">
  <title></title>
</head>
<body>
  <h1></h1>
   <div class="guess-game">
    <div class="game-area">
      <div class="inputs"></div>

    <div class="control">
      <button class="check">تحقق من الكلمة</button>
      <button class="hint"><span></span>تلميح</button>
    </div>
    <div class="message"></div>
    </div>
        <div class="key-area">
          <h2>دلالات الألوان</h2>
          <div class="key-color">
            <div class="key in-place"></div>
            <div class="key-text">الحرف صحيح وفي المكان الصحيح</div>
          </div>
          <div class="key-color">
            <div class="key not-in-place"></div>
            <div class="key-text">الحرف صحيح ولكن في المكان الخطأ</div>
          </div>
          <div class="key-color">
            <div class="key not-correct"></div>
            <div class="key-text">الحرف غير صحيح</div>
          </div>
        </div>

  </div>
  <footer></footer>
  <script src="guss.js"></script>
</body>
</html>
