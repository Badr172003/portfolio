<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="guss.css">
  <title></title>
</head>
<body>
  <h1></h1>
   <div class="guess-game">
    <div class="game-area">
      <div class="inputs"></div>

    <div class="control">
      <button class="check">Check Word</button>
      <button class="hint"><span></span>Hint</button>
    </div>
    <div class="message"></div>
    </div>
        <div class="key-area">
          <h2>Key Colors</h2>
          <div class="key-color">
            <div class="key in-place"></div>
            <div class="key-text">letter is correct and in the right position</div>
          </div>
          <div class="key-color">
            <div class="key not-in-place"></div>
            <div class="key-text">letter is correct but in the wrong position</div>
          </div>
          <div class="key-color">
            <div class="key not-correct"></div>
            <div class="key-text">letter is not correct</div>
          </div>
        </div>

  </div>
  <footer></footer>
  <script src="guss.js"></script>
</body>
</html>
